<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    
    <title>Document</title>
</head>
<body>
<div class="flex h-screen w-full overflow-hidden bg-gray-50">

    <!-- No more button :( -->
    <!-- Sidebar Overlay -->
    <div class="w-[30%] h-full bg-white shadow-xl z-20 overflow-y-auto flex flex-col">
        <div class="p-6">
            <h2 class="text-xl font-bold border-b pb-4 mb-4 text-gray-800">Fermate trovate</h2>

            <div class="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Filtri Trasporto</p>
                <div class="space-y-2">
                    @for (filter of transportFilters; track filter.value) {
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox"  
                                [(ngModel)]="filter.checked" 
                                (change)="onFilterChange()"
                                class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
                            <span class="text-gray-700 group-hover:text-blue-600 transition-colors">{{ filter.label }}</span>
                        </label>
                    }

                    <hr class="my-3 border-gray-200">

                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <input type="checkbox" 
                            [(ngModel)]="useBbox" 
                            (change)="onFilterChange()"
                            class="w-4 h-4 text-green-600 rounded focus:ring-green-500">
                        <span class="text-sm font-medium text-gray-700">Filtra per area visibile</span>
                    </label>
                </div>
            </div>

            <ul class="space-y-2">
                @for (stop of currentStops; track stop.id) {
                    <li (click)="selectStop(stop)" 
                        class="p-3 rounded-lg border border-gray-200 hover:border-blue-500 hover:bg-blue-50 cursor-pointer transition-colors">
                        <div class="font-medium text-gray-800">{{ stop.name }}</div>
                        
                        @if (selectedStopId === stop.id) {
                            <div class="mt-2 text-sm text-gray-600 bg-white p-3 rounded border-l-4 border-blue-500 shadow-sm">
                                <app-timetable [stop]="stop"></app-timetable>
                            </div>
                        }
                    </li>
                } @empty {
                    <li class="text-center text-gray-500 mt-10">Nessuna fermata trovata.</li>
                }
            </ul>
        </div>
    </div>

    <!-- The Map -->
    <div class="w-[70%] h-full relative z-10">
        <div id="map" class="w-full h-full"></div>
    </div>


</div>
</body>
</html>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
