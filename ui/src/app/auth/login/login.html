<div class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 transition-opacity">
    
    <div class="max-w-md w-full bg-white rounded-xl shadow-2xl p-8 border border-gray-100 relative overflow-hidden">
        
        <a routerLink="/" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-full p-1 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </a>

        <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
        
        <div class="text-center mb-8 mt-2">
            <h2 class="text-3xl font-extrabold text-gray-900 flex items-center justify-center gap-2">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A2 2 0 013 15.487V6a2 2 0 011.106-1.789l5.447-2.724a2 2 0 011.894 0l5.447 2.724A2 2 0 0118 6v9.487a2 2 0 01-1.106 1.789L11.447 20a2 2 0 01-1.894 0z"></path></svg>
                Movete
            </h2>
            <p class="mt-2 text-sm text-gray-600">Bentornato! Accedi al tuo account.</p>
        </div>
        
        @if (errorMessage) {
            <div class="mb-4 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <p class="text-sm text-red-700">{{ errorMessage }}</p>
            </div>
        }

        <form (ngSubmit)="onSubmit()" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Indirizzo Email</label>
                <input type="email" [(ngModel)]="email" name="email" required
                    class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" [(ngModel)]="password" name="password" required
                    class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <button type="submit" 
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Accedi
            </button>
        </form>

        <div class="mt-8 text-center border-t border-gray-100 pt-6">
            <p class="text-sm text-gray-600">
                Non hai ancora un account? 
                <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-500 transition-colors cursor-pointer">Registrati ora</a>
            </p>
        </div>
    </div>
</div>
