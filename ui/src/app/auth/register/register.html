<div class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 transition-opacity">
    
    <div class="max-w-md w-full bg-white rounded-xl shadow-2xl p-8 border border-gray-100 relative overflow-hidden">
        
        <a routerLink="/" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-full p-1 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </a>

        <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
        
        <div class="text-center mb-8 mt-2">
            <h2 class="text-3xl font-extrabold text-gray-900">Crea un Account</h2>
            <p class="mt-2 text-sm text-gray-600">Unisciti a Movete in pochi secondi.</p>
        </div>

        @if (errorMessage) {
            <div class="mb-4 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <p class="text-sm text-red-700">{{ errorMessage }}</p>
            </div>
        }

        <form (ngSubmit)="onSubmit()" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Indirizzo Email</label>
                <input type="email" [(ngModel)]="email" name="email" required
                    class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" [(ngModel)]="password" name="password" required minlength="6"
                    class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Conferma Password</label>
                <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required
                    class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
            </div>

            <button type="submit" [disabled]="isLoading"
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors disabled:opacity-70 disabled:cursor-not-allowed items-center h-[42px] mt-2">
                
                @if (isLoading) {
                    <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Registrazione in corso...
                } @else {
                    Registrati
                }
            </button>
        </form>

        <div class="mt-6 text-center border-t border-gray-100 pt-4">
            <p class="text-sm text-gray-600">
                Hai già un account? 
                <a routerLink="/login" class="font-medium text-emerald-600 hover:text-emerald-500 transition-colors cursor-pointer">Torna al Login</a>
            </p>
        </div>
    </div>
</div>
