<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 border border-gray-100 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Crea un Account</h2>
            <p class="mt-2 text-sm text-gray-600">Unisciti a Movete in pochi secondi.</p>
        </div>

        @if (errorMessage) {
            <div class="mb-4 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <p class="text-sm text-red-700">{{ errorMessage }}</p>
            </div>
        }

        <form (ngSubmit)="onSubmit()" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Indirizzo Email</label>
                <input type="email" [(ngModel)]="email" name="email" required
                    class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password (min 6 caratteri)</label>
                <input type="password" [(ngModel)]="password" name="password" required minlength="6"
                    class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Conferma Password</label>
                <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required
                    class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
            </div>

            <button type="submit" 
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
                Registrati
            </button>
        </form>

        <div class="mt-8 text-center border-t border-gray-100 pt-6">
            <p class="text-sm text-gray-600">
                Hai già un account? 
                <a routerLink="/login" class="font-medium text-emerald-600 hover:text-emerald-500 transition-colors">Torna al Login</a>
            </p>
        </div>
    </div>
</div>
